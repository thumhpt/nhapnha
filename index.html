<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kết Quả Tiến Độ GHS 2026</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load PropTypes (Bắt buộc cho Recharts trong môi trường standalone) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Load Babel for JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Recharts (Sử dụng phiên bản 2.1.12 ổn định cho trình duyệt) -->
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js" crossorigin></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, Fragment } = React;
        const { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
          PieChart, Pie, Cell, ReferenceLine
        } = window.Recharts;

        // Custom Icon components since we can't easily import lucide-react in standalone mode
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        function DashboardApp() {
          const [items, setItems] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [error, setError] = useState(null);
          const [selectedTab, setSelectedTab] = useState('Tất cả');

          useEffect(() => {
            const fetchSheetData = async () => {
              setIsLoading(true);
              try {
                const SHEET_ID = '19FF7hUGJCKkAZzwPxc_Igx9E0wMDPYhMsozFTlxL_7A'; 
                const GID = '2109135292';
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

                const response = await fetch(url);
                const text = await response.text();
                const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1];
                const data = JSON.parse(jsonString);

                const fetchedItems = [];
                let currentObjective = "MỤC TIÊU 1: TĂNG CƯỜNG NĂNG LỰC PHÒNG XÉT NGHIỆM CHẨN ĐOÁN DỊCH BỆNH";
                let currentTaskGroup = "Công việc chung";
                
                // Tiền xử lý để tìm Mục tiêu đầu tiên
                let firstObjectiveFound = false;
                for (let row of data.table.rows) {
                    if (!row.c) continue;
                    for (let cell of row.c) {
                        if (cell && typeof cell.v === 'string') {
                            let val = cell.v.toUpperCase().trim();
                            if (val.includes("MỤC TIÊU 1:")) {
                                currentObjective = cell.v.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
                                firstObjectiveFound = true;
                                break;
                            }
                        }
                    }
                    if (firstObjectiveFound) break;
                }
                
                data.table.rows.forEach((row, index) => {
                  if (!row.c) return;

                  // 1. Quét tìm dòng chứa chữ MỤC TIÊU ở bất kỳ cột nào (từ cột A đến cột F)
                  let isObjectiveRow = false;
                  for (let i = 0; i <= 5; i++) {
                    if (row.c[i] && typeof row.c[i].v === 'string') {
                      const val = row.c[i].v.toUpperCase().trim();
                      if (val.startsWith("MỤC TIÊU")) {
                        currentObjective = row.c[i].v.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
                        currentTaskGroup = "Công việc chung"; 
                        isObjectiveRow = true;
                        break;
                      }
                    }
                  }
                  if (isObjectiveRow) return;

                  // 2. Bỏ qua HOÀN TOÀN các dòng tiêu đề rác của bảng Excel
                  const isHeaderRow = row.c.some(cell => cell && typeof cell.v === 'string' && 
                    (cell.v.toUpperCase().includes("HOẠT ĐỘNG") || 
                     cell.v.toUpperCase().includes("TÊN SẢN PHẨM") || 
                     cell.v.toUpperCase().includes("SỐ LƯỢNG") ||
                     cell.v.toUpperCase().includes("TIẾN ĐỘ") ||
                     cell.v.toUpperCase().includes("THỜI GIAN") ||
                     cell.v.toUpperCase() === "SẢN PHẨM/CHỈ SỐ ĐẦU RA"));
                  if (isHeaderRow) return;

                  // 3. Lấy tên Đầu công việc / Hoạt động ở Cột E (Index 4)
                  const activityVal = row.c[4] && row.c[4].v ? String(row.c[4].v).trim() : "";
                  if (!activityVal) return;

                  const hasInd1 = row.c[7] && row.c[7].v;
                  const hasInd2 = row.c[10] && row.c[10].v;
                  const hasInd3 = row.c[13] && row.c[13].v;

                  // Nếu không có chỉ số nào -> Đây là dòng Tiêu đề Nhóm (Đầu công việc)
                  if (!hasInd1 && !hasInd2 && !hasInd3) {
                    currentTaskGroup = activityVal;
                    return;
                  }

                  // 4. Trích xuất dữ liệu của từng cụm chỉ số trên cùng 1 hàng ngang
                  const extractIndicator = (nameCol, targetCol, actualCol, suffix) => {
                    if (row.c[nameCol] && row.c[nameCol].v) {
                      const indName = String(row.c[nameCol].v).trim();
                      const target = row.c[targetCol] ? Number(row.c[targetCol].v) : 0;
                      // Lấy giá trị thực tế (Tiến độ), nếu rỗng thì cho bằng 0
                      const actual = row.c[actualCol] ? Number(row.c[actualCol].v) : 0;

                      fetchedItems.push({
                        id: `gs-${index}-${suffix}`,
                        activity: activityVal,
                        name: indName,
                        target: target,
                        actual: actual,
                        objective: currentObjective,
                        taskGroup: currentTaskGroup
                      });
                    }
                  };

                  extractIndicator(6, 7, 8, 'i1'); // Chỉ số 1 (Cột G, H, I)
                  extractIndicator(9, 10, 11, 'i2'); // Chỉ số 2 (Cột J, K, L)
                  extractIndicator(12, 13, 14, 'i3'); // Chỉ số 3 (Cột M, N, O)
                });

                setItems(fetchedItems.length > 0 ? fetchedItems : []);
                setIsLoading(false);
              } catch (err) {
                console.error("Lỗi khi kết nối Google Sheet:", err);
                setError("Không thể tải dữ liệu. Bạn vui lòng kiểm tra lại xem file Google Sheet đã mở quyền chia sẻ chưa nhé!");
                setIsLoading(false);
              }
            };

            fetchSheetData();
          }, []);
          
          // Lấy danh sách các Mục Tiêu duy nhất để làm Tabs
          const objectivesList = useMemo(() => {
            const uniqueObs = [...new Set(items.map(item => item.objective))];
            return ['Tất cả', ...uniqueObs];
          }, [items]);

          // Lọc dữ liệu theo tab đã chọn
          const filteredItems = useMemo(() => {
            if (selectedTab === 'Tất cả') return items;
            return items.filter(item => item.objective === selectedTab);
          }, [items, selectedTab]);

          // Xử lý dữ liệu: Tính toán phần trăm và trạng thái
          const enrichedData = useMemo(() => {
            return filteredItems.map(item => {
              const target = parseFloat(item.target) || 0;
              const actual = parseFloat(item.actual) || 0;
              
              let percent = 0;
              if (target !== 0) {
                percent = (actual / target) * 100;
              } else {
                percent = actual > 0 ? 100 : 0; 
              }

              return {
                ...item,
                percent: parseFloat(percent.toFixed(1)),
                isMet: actual >= target,
                chartLabel: item.activity.length > 25 
                  ? `${item.activity.substring(0, 25)}... (${item.name})` 
                  : `${item.activity} (${item.name})`
              };
            });
          }, [filteredItems]);

          // Tính toán các chỉ số tổng quan cho Summary Cards
          const metrics = useMemo(() => {
            const total = enrichedData.length;
            const met = enrichedData.filter(d => d.isMet).length;
            const unmet = total - met;
            
            const avgCompletion = total > 0 
              ? enrichedData.reduce((sum, item) => sum + item.percent, 0) / total 
              : 0;

            return { 
              total, 
              met, 
              unmet, 
              avgCompletion: parseFloat(avgCompletion.toFixed(1)) 
            };
          }, [enrichedData]);

          // Phân nhóm dữ liệu theo Cấu trúc cây 3 tầng: Đầu công việc -> Hoạt động -> Sản phẩm/Chỉ số
          const groupedTree = useMemo(() => {
            const tree = {};
            enrichedData.forEach(item => {
              if (!tree[item.taskGroup]) {
                tree[item.taskGroup] = {};
              }
              if (!tree[item.taskGroup][item.activity]) {
                tree[item.taskGroup][item.activity] = [];
              }
              tree[item.taskGroup][item.activity].push(item);
            });
            return tree;
          }, [enrichedData]);

          const pieData = [
            { name: 'Đạt chỉ tiêu', value: metrics.met },
            { name: 'Chưa đạt', value: metrics.unmet }
          ];

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 font-sans">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* Header Section */}
                <header className="flex flex-col md:flex-row items-start md:items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                  <div className="flex items-center space-x-4">
                    <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl">
                      <Icon name="file-spreadsheet" size="32" />
                    </div>
                    <div>
                      <h1 className="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">Dashboard Kết Quả Tiến Độ</h1>
                      <p className="text-sm font-medium text-slate-500 mt-1">
                        Đồng bộ tự động từ: <a href="https://docs.google.com/spreadsheets/d/19FF7hUGJCKkAZzwPxc_Igx9E0wMDPYhMsozFTlxL_7A/edit" target="_blank" rel="noreferrer" className="text-indigo-600 font-semibold hover:underline">Google Sheets GHS_2026</a>
                      </p>
                    </div>
                  </div>
                </header>

                {/* Tabs Navigation */}
                {!isLoading && !error && objectivesList.length > 1 && (
                  <div className="flex flex-wrap gap-3 pb-2">
                    {objectivesList.map((obj, idx) => (
                      <button
                        key={idx}
                        onClick={() => setSelectedTab(obj)}
                        title={obj}
                        className={`px-5 py-3 text-sm font-bold rounded-xl transition-all duration-300 shadow-sm text-left max-w-xl whitespace-normal leading-snug ${
                          selectedTab === obj 
                            ? 'bg-indigo-600 text-white ring-2 ring-indigo-200 ring-offset-2' 
                            : 'bg-white text-slate-600 hover:bg-indigo-50 border border-slate-200'
                        }`}
                      >
                        {obj}
                      </button>
                    ))}
                  </div>
                )}

                {isLoading && (
                  <div className="p-4 bg-indigo-50 text-indigo-700 rounded-2xl flex flex-col items-center justify-center py-10 border border-indigo-100">
                    <Icon name="activity" className="animate-spin mb-3 text-indigo-500" size="32" />
                    <span className="font-semibold text-lg">Đang đồng bộ dữ liệu từ Google Sheets...</span>
                    <span className="text-sm mt-1 opacity-80">Vui lòng đợi trong giây lát</span>
                  </div>
                )}

                {error && (
                  <div className="p-5 bg-rose-50 text-rose-700 rounded-2xl flex items-start border border-rose-200 shadow-sm">
                    <Icon name="x-circle" className="mr-3 flex-shrink-0 mt-0.5" size="24" />
                    <div>
                      <h3 className="font-bold text-lg mb-1">Lỗi đồng bộ dữ liệu</h3>
                      <p className="font-medium">{error}</p>
                    </div>
                  </div>
                )}

                {/* Summary Metric Cards */}
                {!isLoading && !error && (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-5 transition-transform hover:-translate-y-1 duration-300">
                      <div className="p-4 bg-blue-50 text-blue-600 rounded-full">
                        <Icon name="layout-dashboard" size="32" />
                      </div>
                      <div>
                        <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">Tổng đầu mục</p>
                        <h3 className="text-4xl font-black text-blue-600">{metrics.total}</h3>
                      </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-5 transition-transform hover:-translate-y-1 duration-300">
                      <div className="p-4 bg-emerald-50 text-emerald-600 rounded-full">
                        <Icon name="target" size="32" />
                      </div>
                      <div>
                        <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">Đạt chỉ tiêu</p>
                        <h3 className="text-4xl font-black text-emerald-600">{metrics.met} <span className="text-base font-medium text-slate-400">/ {metrics.total}</span></h3>
                      </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-5 transition-transform hover:-translate-y-1 duration-300">
                      <div className="p-4 bg-purple-50 text-purple-600 rounded-full">
                        <Icon name="trending-up" size="32" />
                      </div>
                      <div>
                        <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">Trung bình hoàn thành</p>
                        <h3 className="text-4xl font-black text-purple-600">{metrics.avgCompletion}%</h3>
                      </div>
                    </div>
                  </div>
                )}

                {}
                {!isLoading && !error && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                      <h3 className="text-lg font-bold text-slate-800 flex items-center mb-6">
                        <Icon name="activity" className="mr-2 text-indigo-500" size="24"/> % Hoàn thành theo từng Sản phẩm/Chỉ số
                      </h3>
                      <div className="h-80 w-full">
                        <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={enrichedData} margin={{ top: 20, right: 10, left: -20, bottom: 5 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                            <XAxis 
                              dataKey="chartLabel" 
                              tick={{fontSize: 11, fill: '#64748b', fontWeight: 500}} 
                              tickMargin={12} 
                              axisLine={false} 
                              tickLine={false} 
                              tickFormatter={(val) => val.length > 20 ? val.substring(0, 20) + '...' : val}
                            />
                            <YAxis 
                              tick={{fontSize: 12, fill: '#64748b', fontWeight: 500}} 
                              axisLine={false} 
                              tickLine={false} 
                              tickFormatter={(val) => `${val}%`} 
                            />
                            <Tooltip 
                              cursor={{fill: '#f8fafc'}}
                              contentStyle={{ borderRadius: '12px', border: '1px solid #e2e8f0', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }}
                            />
                            <ReferenceLine y={100} stroke="#10b981" strokeDasharray="4 4" label={{ position: 'top', value: 'Mục tiêu (100%)', fill: '#10b981', fontSize: 12, fontWeight: 600 }} />
                            <Bar dataKey="percent" name="% Hoàn thành" radius={[6, 6, 0, 0]} maxBarSize={60}>
                              {enrichedData.map((entry, index) => (
                                <Cell key={`cell-${index}`} fill={entry.isMet ? '#34d399' : '#60a5fa'} />
                              ))}
                            </Bar>
                          </BarChart>
                        </ResponsiveContainer>
                      </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h3 className="text-lg font-bold text-slate-800 flex items-center mb-6">
                        <Icon name="target" className="mr-2 text-emerald-500" size="24"/> Tỷ lệ đạt chỉ tiêu
                      </h3>
                      <div className="h-64 w-full">
                        <ResponsiveContainer width="100%" height="100%">
                          <PieChart>
                            <Pie
                              data={pieData}
                              cx="50%"
                              cy="50%"
                              innerRadius={60}
                              outerRadius={80}
                              paddingAngle={5}
                              dataKey="value"
                            >
                              {pieData.map((entry, index) => (
                                <Cell key={`cell-${index}`} fill={index === 0 ? '#10b981' : '#f43f5e'} />
                              ))}
                            </Pie>
                            <Tooltip 
                              contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }}
                            />
                            <Legend verticalAlign="bottom" height={36} iconType="circle" />
                          </PieChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                  </div>
                )}

                {}
                {!isLoading && !error && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                  <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                    <h3 className="text-lg font-bold text-slate-800">
                      {selectedTab === 'Tất cả' ? 'Bảng dữ liệu chi tiết toàn dự án' : `Chi tiết: ${selectedTab}`}
                    </h3>
                  </div>
                  
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm text-slate-600 whitespace-nowrap">
                      <thead className="bg-white text-slate-500 font-semibold text-xs uppercase tracking-wider border-b border-slate-200">
                        <tr>
                          <th className="px-6 py-4 w-[45%]">Tên Đầu Mục / Hoạt Động / Sản phẩm</th>
                          <th className="px-6 py-4 text-right">Chỉ tiêu</th>
                          <th className="px-6 py-4 text-right">Thực tế</th>
                          <th className="px-6 py-4 min-w-[150px]">Tiến độ (%)</th>
                          <th className="px-6 py-4">Trạng thái</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        
                        {Object.entries(groupedTree).map(([groupName, activities], groupIdx) => (
                          <Fragment key={`group-${groupIdx}`}>
                            
                            {/* Dòng Header của Đầu công việc */}
                            <tr className="bg-slate-200/60 border-y border-slate-300">
                              <td colSpan="5" className="px-6 py-3 font-bold text-slate-800 whitespace-normal">
                                <div className="flex items-start">
                                   <div className="w-2 h-4 bg-indigo-600 rounded-full mr-2.5 mt-0.5 shrink-0"></div>
                                   <span className="uppercase">{groupName}</span>
                                </div>
                              </td>
                            </tr>
                            
                            {Object.entries(activities).map(([activityName, indicators], actIdx) => (
                              <Fragment key={`act-${groupIdx}-${actIdx}`}>
                                {/* Dòng Header của Hoạt động */}
                                <tr className="bg-slate-50/80 border-b border-slate-100">
                                  <td colSpan="5" className="px-6 py-2 font-semibold text-slate-700 whitespace-normal pl-12 relative">
                                    <div className="absolute left-6 top-0 bottom-0 w-px bg-slate-300"></div>
                                    <div className="absolute left-6 top-1/2 w-4 h-px bg-slate-300"></div>
                                    <span className="text-indigo-800">{activityName}</span>
                                  </td>
                                </tr>

                                {/* Dòng Sản phẩm/Chỉ số */}
                                {indicators.map((row) => (
                                  <tr key={row.id} className="hover:bg-slate-50 transition-colors group">
                                    <td className="px-6 py-3 text-slate-600 pl-20 relative whitespace-normal min-w-[250px]">
                                      <div className="absolute left-6 top-0 bottom-0 w-px bg-slate-300"></div>
                                      <div className="absolute left-14 top-0 bottom-0 w-px bg-slate-200"></div>
                                      <div className="absolute left-14 top-1/2 w-4 h-px bg-slate-200"></div>
                                      <span className="font-medium text-slate-500 mr-2">Sản phẩm/Chỉ số:</span>
                                      <span className="font-bold text-slate-700">{row.name}</span>
                                    </td>
                                    <td className="px-6 py-3 text-right font-medium">{row.target.toLocaleString()}</td>
                                    <td className="px-6 py-3 text-right font-bold text-indigo-600">{row.actual.toLocaleString()}</td>
                                    <td className="px-6 py-3">
                                      <div className="flex items-center space-x-3">
                                        <span className="font-bold w-12 text-right">{row.percent}%</span>
                                        <div className="flex-1 h-2.5 bg-slate-200 rounded-full overflow-hidden">
                                          <div 
                                            className={`h-full rounded-full transition-all duration-500 ${row.isMet ? 'bg-emerald-500' : 'bg-blue-500'}`} 
                                            style={{ width: `${Math.min(row.percent, 100)}%` }}
                                          ></div>
                                        </div>
                                      </div>
                                    </td>
                                    <td className="px-6 py-3">
                                      {row.isMet ? (
                                        <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">
                                          <Icon name="check-circle" size="14" className="mr-1.5" /> Đạt
                                        </span>
                                      ) : (
                                        <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-rose-100 text-rose-700">
                                          <Icon name="x-circle" size="14" className="mr-1.5" /> Chưa đạt
                                        </span>
                                      )}
                                    </td>
                                  </tr>
                                ))}
                              </Fragment>
                            ))}
                          </Fragment>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardApp />);
    </script>
</body>
</html>
